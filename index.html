<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abriendo Documento...</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .boton-manual {
            display: none;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loader" class="loader"></div>
    <h2 id="mensaje">Buscando tu documento...</h2>
    <p id="submensaje">Por favor, espera un momento.</p>
    
    <!-- Botón de emergencia si falla la redirección automática -->
    <a id="enlace-manual" class="boton-manual" href="#">Abrir documento manualmente</a>

    <script>
        // 1. Obtener el nombre del archivo desde la URL del QR (?doc=nombredelarchivo)
        const params = new URLSearchParams(window.location.search);
        const archivoPDF = params.get('doc'); 

        const mensaje = document.getElementById('mensaje');
        const submensaje = document.getElementById('submensaje');
        const loader = document.getElementById('loader');
        const botonManual = document.getElementById('enlace-manual');

        if (archivoPDF) {
            // Construimos la ruta directa al archivo PDF
            const rutaDestino = `./pdfs/${archivoPDF}.pdf`;

            // Redirigir de inmediato al PDF para que el celular lo abra de forma nativa
            window.location.href = rutaDestino;

            // En celulares, por si la redirección automática se congela, activamos un plan B a los 2 segundos:
            setTimeout(() => {
                mensaje.innerText = "Casi listo";
                submensaje.innerText = "Si el documento no se abrió automáticamente, presiona el botón de abajo:";
                loader.style.display = "none";
                botonManual.href = rutaDestino;
                botonManual.style.display = "inline-block";
            }, 2000);

        } else {
            // Mensaje si escanean un QR mal configurado
            loader.style.display = "none";
            mensaje.innerText = "⚠️ Enlace Inválido";
            submensaje.innerText = "El código QR escaneado no contiene la información de ningún documento.";
        }
    </script>
</body>
</html>
