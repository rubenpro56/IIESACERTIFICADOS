<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Documentos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background-color: #f4f4f9; }
        .error-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; color: #333; }
        .error-icon { font-size: 50px; margin-bottom: 10px; }
        .debug-info { margin-top: 15px; padding: 10px; background: #eee; border-radius: 5px; font-family: monospace; font-size: 12px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="app" style="width: 100%; height: 100%;"></div>

    <script>
        // 1. Obtener el parámetro 'doc' de la URL de forma exacta
        const params = new URLSearchParams(window.location.search);
        const archivoPDF = params.get('doc'); 

        const contenedor = document.getElementById('app');

        if (archivoPDF) {
            // Buscamos el archivo respetando el nombre exacto que envías en el QR
            const rutaCompleta = `./pdfs/${archivoPDF}.pdf`;

            // 2. Insertar el visor
            contenedor.innerHTML = `<iframe src="${rutaCompleta}"></iframe>`;
        } else {
            contenedor.innerHTML = `
                <div class="error-container">
                    <div class="error-icon">⚠️</div>
                    <h2>Documento no especificado</h2>
                    <p>El enlace del código QR no contiene un identificador.</p>
                    <div class="debug-info">URL detectada: ${window.location.href}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
